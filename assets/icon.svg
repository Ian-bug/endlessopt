<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Main gradient background -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#764ba2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:1" />
    </linearGradient>

    <!-- Inner glow effect -->
    <radialGradient id="glowEffect" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>

    <!-- Speed line gradient -->
    <linearGradient id="speedGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.4" />
    </linearGradient>
  </defs>

  <!-- Background circle with gradient -->
  <circle cx="256" cy="256" r="240" fill="url(#mainGradient)"/>

  <!-- Inner glow -->
  <circle cx="256" cy="256" r="200" fill="url(#glowEffect)"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.3"/>

  <!-- Speedometer/tachometer background arc -->
  <path d="M 136 356 A 180 180 0 0 1 376 356" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.2" stroke-linecap="round"/>

  <!-- Speed/tick marks - optimized performance indicators -->
  <g stroke="url(#speedGradient)" stroke-width="3" stroke-linecap="round" opacity="0.8">
    <!-- Left side ticks -->
    <line x1="96" y1="356" x2="116" y2="356" />
    <line x1="76" y1="316" x2="96" y2="326" />
    <line x1="66" y1="276" x2="86" y2="286" />
    <line x1="66" y1="236" x2="86" y2="236" />

    <!-- Right side ticks -->
    <line x1="416" y1="356" x2="396" y2="356" />
    <line x1="436" y1="316" x2="416" y2="326" />
    <line x1="446" y1="276" x2="426" y2="286" />
    <line x1="446" y1="236" x2="426" y2="236" />
  </g>

  <!-- Performance boost indicator - lightning bolt style -->
  <g transform="translate(256, 256)">
    <!-- Central boost symbol -->
    <polygon points="0,-60 15,-10 5,-10 25,60 -15,10 -5,10" fill="#ffffff" opacity="0.95"/>
    <polygon points="0,-60 15,-10 5,-10 25,60 -15,10 -5,10" fill="#FFD700" transform="rotate(22.5)"/>

    <!-- Speed motion lines -->
    <g stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.6">
      <line x1="-40" y1="-80" x2="-20" y2="-70" />
      <line x1="-50" y1="-60" x2="-30" y2="-50" />
      <line x1="-55" y1="-40" x2="-35" y2="-30" />
    </g>
  </g>

  <!-- Optimization rings -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.15"/>
  <circle cx="256" cy="256" r="100" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.1"/>

  <!-- "EO" branding text -->
  <text x="256" y="420" font-family="Arial Black, Arial, sans-serif" font-size="72" font-weight="900" fill="#ffffff" text-anchor="middle" opacity="0.95" letter-spacing="4">EO</text>

  <!-- Subtitle "OPT" -->
  <text x="256" y="455" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle" opacity="0.8" letter-spacing="8">SYSTEM OPTIMIZER</text>

  <!-- Performance indicator dots -->
  <g fill="#ffffff" opacity="0.9">
    <circle cx="196" cy="480" r="4" />
    <circle cx="226" cy="480" r="4" />
    <circle cx="286" cy="480" r="4" />
    <circle cx="316" cy="480" r="4" />
  </g>
</svg>